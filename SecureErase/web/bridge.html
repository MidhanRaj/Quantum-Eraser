<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MetaMask Bridge — EraseXpertz</title>
    <style>
        body {
            background: #0a0a0c;
            color: #e0e0e0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #16161a;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>MetaMask Bridge</h1>
        <p>Connect your desktop MetaMask extension to authorize deletion logs.</p>
        <button id="connect-btn" class="btn" onclick="connect()">Connect MetaMask</button>
        <div id="status" class="status">Waiting for connection...</div>
    </div>
    <script>
        async function connect() {
            const status = document.getElementById('status');
            const btn = document.getElementById('connect-btn');
            if (!window.ethereum) return status.innerText = "Error: MetaMask not detected.";
            try {
                btn.innerText = "Connecting...";
                btn.disabled = true;
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const address = accounts[0];
                status.innerText = "Authorized! Returning to app...";
                window.location.href = `${window.location.origin}/callback?address=${address}`;
            } catch (err) {
                status.innerText = "Error: " + err.message;
                btn.innerText = "Retry";
                btn.disabled = false;
            }
        }
        // Auto-trigger if returning from a transaction or specific state
        if (new URLSearchParams(window.location.search).get('txData')) connect();
    </script>
</body>

</html>
